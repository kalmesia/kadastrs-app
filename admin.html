<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Kadastrs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f1117; --surface:#1a1c25; --surface2:#23262f; --border:#2e3140; --text:#e8e9ed; --muted:#8b8fa3; --accent:#34d399; --orange:#f59e0b; --red:#ef4444; --radius:8px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:800px; margin:0 auto; padding:20px; }
  h1 { font-size:18px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
  h1 a { color:var(--accent); text-decoration:none; font-size:12px; font-weight:400; }
  .login-box { max-width:320px; margin:80px auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }
  .login-box h2 { font-size:14px; margin-bottom:16px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .login-box input { width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; margin-bottom:12px; outline:none; }
  .login-box input:focus { border-color:var(--accent); }
  .login-box button { width:100%; padding:10px; background:var(--accent); border:none; border-radius:6px; color:var(--bg); font-weight:700; font-size:13px; cursor:pointer; }
  .login-box .err { color:var(--red); font-size:12px; margin-top:8px; }
  .form-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
  .form-row { display:flex; gap:10px; margin-bottom:10px; }
  .form-row.full { flex-direction:column; }
  .form-field { flex:1; }
  .form-field label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:4px; }
  .form-field input, .form-field textarea { width:100%; padding:8px; background:var(--surface2); border:1px solid var(--border); border-radius:5px; color:var(--text); font-size:13px; font-family:'JetBrains Mono',monospace; outline:none; }
  .form-field input:focus, .form-field textarea:focus { border-color:var(--accent); }
  .form-field textarea { resize:vertical; min-height:50px; font-family:'DM Sans',sans-serif; }
  .btn { padding:8px 16px; border:none; border-radius:5px; font-size:12px; font-weight:600; cursor:pointer; transition:opacity .15s; }
  .btn:hover { opacity:.85; }
  .btn-green { background:var(--accent); color:var(--bg); }
  .btn-red { background:var(--red); color:#fff; }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
  .form-actions { display:flex; gap:8px; }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { text-align:left; padding:8px 10px; background:var(--surface2); color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:1px; font-weight:500; }
  td { padding:8px 10px; border-top:1px solid var(--border); }
  .code { font-family:'JetBrains Mono',monospace; color:var(--accent); font-size:12px; }
  .price { color:var(--orange); font-weight:600; }
  .status-active { color:var(--accent); }
  .status-inactive { color:var(--muted); }
  .row-actions { display:flex; gap:4px; }
  .row-btn { padding:4px 8px; border-radius:4px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:10px; cursor:pointer; }
  .row-btn:hover { border-color:var(--accent); color:var(--accent); }
  .row-btn.del:hover { border-color:var(--red); color:var(--red); }
  .import-section { margin-top:16px; }
  .import-section summary { cursor:pointer; font-size:12px; color:var(--muted); padding:8px 0; }
  .import-area { margin-top:8px; }
  .import-area textarea { width:100%; min-height:100px; padding:8px; background:var(--surface2); border:1px solid var(--border); border-radius:5px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:11px; }
  .empty { text-align:center; padding:30px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>
<div id="loginScreen" class="login-box">
  <h2>Admin</h2>
  <input type="password" id="passInput" placeholder="Parole" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Ieiet</button>
  <div class="err" id="loginErr"></div>
</div>
<div id="adminPanel" class="container" style="display:none">
  <h1>Sludinājumu pārvaldība <a href="/">← Uz karti</a></h1>
  <div class="form-card">
    <div class="form-row">
      <div class="form-field"><label>Kadastra apzīmējums *</label><input type="text" id="fCode" placeholder="78440030019"></div>
      <div class="form-field"><label>Cena €</label><input type="number" id="fPrice" placeholder="25000"></div>
      <div class="form-field"><label>Platība ha</label><input type="number" id="fArea" placeholder="12.5" step="0.01"></div>
    </div>
    <div class="form-row full">
      <div class="form-field"><label>Apraksts</label><textarea id="fDesc" placeholder="Lauksaimniecības zeme, līdzena, pie ceļa..."></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-green" onclick="addListing()">Pievienot</button>
      <button class="btn btn-outline" onclick="clearForm()">Notīrīt</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Kadastra nr.</th><th>Cena</th><th>ha</th><th>Apraksts</th><th>Statuss</th><th></th></tr></thead>
      <tbody id="listingsBody"><tr><td colspan="6" class="empty">Nav sludinājumu</td></tr></tbody>
    </table>
  </div>
  <details class="import-section">
    <summary>CSV / masveida imports</summary>
    <div class="import-area">
      <textarea id="importData" placeholder="kadastra_kods;cena;ha;apraksts&#10;78440030019;25000;12.5;Lauksaimniecības zeme"></textarea>
      <div style="margin-top:8px"><button class="btn btn-green" onclick="bulkImport()">Importēt</button></div>
    </div>
  </details>
</div>
<script>
const API='/api/admin';let authToken='';
async function doLogin(){const pass=document.getElementById('passInput').value;const resp=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});if(resp.ok){authToken=pass;document.getElementById('loginScreen').style.display='none';document.getElementById('adminPanel').style.display='block';loadListings()}else{document.getElementById('loginErr').textContent='Nepareiza parole'}}
function headers(){return{'Content-Type':'application/json','X-Admin-Token':authToken}}
async function loadListings(){const resp=await fetch(`${API}/listings`,{headers:headers()});const data=await resp.json();const tbody=document.getElementById('listingsBody');if(data.length===0){tbody.innerHTML='<tr><td colspan="6" class="empty">Nav sludinājumu</td></tr>';return}tbody.innerHTML=data.map(r=>`<tr><td class="code">${r.cadastral_code}</td><td class="price">${r.price?'€'+Number(r.price).toLocaleString('lv-LV'):'—'}</td><td>${r.area_ha||'—'}</td><td>${r.description||'—'}</td><td><span class="status-${r.status}">${r.status}</span></td><td class="row-actions"><button class="row-btn" onclick="toggleStatus(${r.id},'${r.status}')">${r.status==='active'?'Deaktivēt':'Aktivēt'}</button><button class="row-btn del" onclick="deleteListing(${r.id})">Dzēst</button></td></tr>`).join('')}
async function addListing(){const body={cadastral_code:document.getElementById('fCode').value.trim(),price:parseFloat(document.getElementById('fPrice').value)||null,area_ha:parseFloat(document.getElementById('fArea').value)||null,description:document.getElementById('fDesc').value.trim()};if(!body.cadastral_code)return alert('Ievadiet kadastra apzīmējumu');await fetch(`${API}/listings`,{method:'POST',headers:headers(),body:JSON.stringify(body)});clearForm();loadListings()}
async function toggleStatus(id,current){const newStatus=current==='active'?'inactive':'active';const resp=await fetch(`${API}/listings/${id}`,{headers:headers()});const listing=await resp.json();listing.status=newStatus;await fetch(`${API}/listings/${id}`,{method:'PUT',headers:headers(),body:JSON.stringify(listing)});loadListings()}
async function deleteListing(id){if(!confirm('Tiešām dzēst?'))return;await fetch(`${API}/listings/${id}`,{method:'DELETE',headers:headers()});loadListings()}
function clearForm(){['fCode','fPrice','fArea','fDesc'].forEach(id=>document.getElementById(id).value='')}
async function bulkImport(){const raw=document.getElementById('importData').value.trim();if(!raw)return;const items=raw.split('\n').filter(l=>l.trim()).map(line=>{const p=line.split(';').map(s=>s.trim());return{cadastral_code:p[0]||'',price:parseFloat(p[1])||null,area_ha:parseFloat(p[2])||null,description:p[3]||''}});const resp=await fetch(`${API}/import`,{method:'POST',headers:headers(),body:JSON.stringify({items})});const result=await resp.json();alert(`Importēti ${result.imported} ieraksti`);document.getElementById('importData').value='';loadListings()}
</script>
</body>
</html>
