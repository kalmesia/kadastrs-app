<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kadastra Karte</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f1117; --surface:#1a1c25; --surface-2:#23262f; --border:#2e3140; --text:#e8e9ed; --text-muted:#8b8fa3; --accent:#34d399; --accent-dim:rgba(52,211,153,0.12); --accent-glow:rgba(52,211,153,0.25); --orange:#f59e0b; --red:#ef4444; --blue:#3b82f6; --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.4); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
  #map { position:absolute; inset:0; z-index:1; }
  .search-panel { position:absolute; top:10px; left:10px; z-index:1000; width:280px; max-width:calc(100vw - 20px); }
  .search-bar { display:flex; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; transition:border-color .2s; }
  .search-bar:focus-within { border-color:var(--accent); box-shadow:var(--shadow),0 0 0 3px var(--accent-dim); }
  .search-icon { padding:0 0 0 10px; display:flex; align-items:center; color:var(--text-muted); flex-shrink:0; }
  .search-bar input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; padding:9px 8px; letter-spacing:.3px; }
  .search-bar input::placeholder { color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:11px; }
  .search-btn { background:var(--accent); border:none; color:var(--bg); padding:9px 11px; cursor:pointer; transition:background .15s; display:flex; align-items:center; }
  .search-btn:hover { background:#2bc48a; }
  .search-btn:disabled { opacity:.5; cursor:not-allowed; }
  .result-card { margin-top:6px; background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow); overflow:hidden; animation:slideDown .2s ease; }
  @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .result-header { padding:8px 10px 6px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .result-header h3 { font-size:9px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-muted); font-weight:500; }
  .result-close { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:1px; line-height:1; font-size:14px; transition:color .15s; }
  .result-close:hover { color:var(--text); }
  .result-body { padding:8px 10px 10px; }
  .result-cadastral { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:500; color:var(--accent); margin-bottom:6px; letter-spacing:.3px; }
  .result-row { display:flex; justify-content:space-between; align-items:baseline; padding:2px 0; }
  .result-label { font-size:10px; color:var(--text-muted); }
  .result-value { font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text); }
  .result-actions { margin-top:8px; display:flex; gap:5px; }
  .action-btn { flex:1; padding:5px 8px; border-radius:5px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); font-family:'DM Sans',sans-serif; font-size:10px; font-weight:500; cursor:pointer; transition:all .15s; text-align:center; }
  .action-btn:hover { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); }
  .coords-link { color:var(--accent); text-decoration:none; display:inline-flex; align-items:center; gap:5px; transition:opacity .15s; }
  .coords-link:hover { opacity:.8; text-decoration:underline; }
  .status-msg { margin-top:6px; padding:6px 10px; border-radius:6px; font-size:11px; animation:slideDown .2s ease; }
  .status-msg.error { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.25); color:#fca5a5; }
  .status-msg.info { background:var(--accent-dim); border:1px solid rgba(52,211,153,.2); color:var(--accent); }
  .status-msg.loading { background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.2); color:#93c5fd; display:flex; align-items:center; gap:10px; }
  .spinner { width:16px; height:16px; border:2px solid rgba(59,130,246,.25); border-top-color:#3b82f6; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .coords-badge { position:absolute; bottom:8px; right:8px; z-index:1000; background:rgba(26,28,37,.7); border:none; border-radius:4px; padding:4px 8px; font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-muted); letter-spacing:.2px; }
  .history-list { margin-top:6px; max-height:220px; overflow-y:auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); animation:slideDown .2s ease; display:none; }
  .history-list.show { display:block; }
  .history-item { padding:10px 14px; font-family:'JetBrains Mono',monospace; font-size:13px; cursor:pointer; transition:background .1s; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .history-item:last-child { border-bottom:none; }
  .history-item:hover { background:var(--accent-dim); color:var(--accent); }
  .history-item .area-hint { font-size:11px; color:var(--text-muted); }
  .results-list { max-height:350px; overflow-y:auto; }
  .results-list-item { padding:12px 16px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; }
  .results-list-item:last-child { border-bottom:none; }
  .results-list-item:hover { background:var(--accent-dim); }
  .results-list-item .code { font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--accent); }
  .results-list-item .meta { font-size:12px; color:var(--text-muted); margin-top:3px; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .leaflet-tile-pane { filter:none; }
  .leaflet-control-zoom { display:none !important; }
  .custom-zoom { position:absolute; top:10px; right:10px; z-index:1000; display:flex; flex-direction:column; gap:1px; }
  .zoom-btn { width:30px; height:30px; background:rgba(26,28,37,.8); border:1px solid var(--border); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; font-weight:300; }
  .zoom-btn:first-child { border-radius:6px 6px 0 0; }
  .zoom-btn:last-child { border-radius:0 0 6px 6px; }
  .zoom-btn:hover { background:var(--surface-2); color:var(--accent); }
  @media (max-width:480px) { .search-panel{width:calc(100vw - 32px)} .coords-badge{display:none} }
  .price-label { background:rgba(245,158,11,.9); color:#000; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; padding:2px 6px; border-radius:4px; white-space:nowrap; text-align:center; pointer-events:none; }
  .dark-popup .leaflet-popup-content-wrapper { background:var(--surface); color:var(--text); border-radius:8px; border:1px solid var(--border); box-shadow:var(--shadow); }
  .dark-popup .leaflet-popup-tip { background:var(--surface); }
  .listing-popup { padding:4px; }
  .lp-code { font-family:'JetBrains Mono',monospace; font-size:12px; color:#f59e0b; margin-bottom:4px; }
  .lp-price { font-size:16px; font-weight:700; color:var(--text); margin-bottom:2px; }
  .lp-area { font-size:11px; color:var(--text-muted); }
  .lp-desc { font-size:11px; color:var(--text-muted); margin-top:4px; border-top:1px solid var(--border); padding-top:4px; }
</style>
</head>
<body>
<div id="map"></div>
<div class="search-panel">
  <div class="search-bar">
    <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
    <input type="text" id="searchInput" placeholder="Kadastra nr., piem. 78440030019" autocomplete="off" spellcheck="false">
    <button class="search-btn" id="searchBtn" onclick="searchParcel()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
  </div>
  <div class="history-list" id="historyList"></div>
  <div id="statusArea"></div>
  <div id="resultArea"></div>
</div>
<div class="custom-zoom">
  <button class="zoom-btn" onclick="map.zoomIn()" title="Pietuvināt">+</button>
  <button class="zoom-btn" onclick="map.zoomOut()" title="Attālināt">−</button>
</div>
<div class="coords-badge" id="coordsBadge">56.9496° N, 24.1052° E</div>
<script>
const map=L.map('map',{center:[56.9496,24.1052],zoom:8,zoomControl:false,attributionControl:true});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19}).addTo(map);
const WMS_BASE='https://lvmgeoserver.lvm.lv/geoserver/ows';
L.tileLayer.wms(WMS_BASE,{layers:'publicwfs:kkparcel',format:'image/png',transparent:true,version:'1.3.0',opacity:0.7,maxZoom:20}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20,pane:'overlayPane'}).addTo(map);
const WFS_BASE='https://lvmgeoserver.lvm.lv/geoserver/publicwfs/wfs';
map.on('mousemove',e=>{document.getElementById('coordsBadge').textContent=`${e.latlng.lat.toFixed(4)}° N, ${e.latlng.lng.toFixed(4)}° E`});
let searchHistory=JSON.parse(localStorage.getItem('cadSearchHistory')||'[]'),highlightLayer=null;
const searchInput=document.getElementById('searchInput'),historyList=document.getElementById('historyList');
searchInput.addEventListener('focus',showHistory);
searchInput.addEventListener('input',()=>{if(searchInput.value.length===0)showHistory();else historyList.classList.remove('show')});
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter')searchParcel()});
document.addEventListener('click',e=>{if(!e.target.closest('.search-panel'))historyList.classList.remove('show')});
function showHistory(){if(searchHistory.length===0||searchInput.value.length>0)return;historyList.innerHTML=searchHistory.slice(0,8).map(h=>`<div class="history-item" onclick="selectHistory('${h.code}')"><span>${h.code}</span><span class="area-hint">${h.area?(h.area/10000).toFixed(2)+' ha':''}</span></div>`).join('');historyList.classList.add('show')}
function selectHistory(code){searchInput.value=code;historyList.classList.remove('show');searchParcel()}
function addToHistory(code,area){searchHistory=searchHistory.filter(h=>h.code!==code);searchHistory.unshift({code,area});searchHistory=searchHistory.slice(0,20);localStorage.setItem('cadSearchHistory',JSON.stringify(searchHistory))}
function showStatus(type,msg){const a=document.getElementById('statusArea');a.innerHTML=type==='loading'?`<div class="status-msg loading"><div class="spinner"></div>${msg}</div>`:`<div class="status-msg ${type}">${msg}</div>`}
function clearStatus(){document.getElementById('statusArea').innerHTML=''}
function clearResult(){document.getElementById('resultArea').innerHTML=''}
async function searchParcel(){const raw=searchInput.value.trim();if(!raw)return;const code=raw.replace(/[\s\-]/g,'');clearResult();showStatus('loading','Meklēju...');document.getElementById('searchBtn').disabled=true;try{const isPartial=code.length<11;const cqlFilter=isPartial?`code LIKE '${code}%'`:`code = '${code}'`;const params=new URLSearchParams({service:'WFS',version:'2.0.0',request:'GetFeature',typeName:'publicwfs:kkparcel',outputFormat:'application/json',srsName:'EPSG:4326',CQL_FILTER:cqlFilter,count:'50'});const resp=await fetch(`${WFS_BASE}?${params}`);if(!resp.ok)throw new Error(`HTTP ${resp.status}`);const data=await resp.json();if(!data.features||data.features.length===0){showStatus('error',`Nav atrasts: "${code}"`);document.getElementById('searchBtn').disabled=false;return}clearStatus();if(data.features.length===1)showSingleResult(data.features[0]);else showMultipleResults(data.features,code)}catch(err){console.error(err);showStatus('error',`Kļūda: ${err.message}`)}document.getElementById('searchBtn').disabled=false}
function showSingleResult(feature){const props=feature.properties||{};const code=props.code||props.CODE||props.label||'?';highlightFeature(feature);const geoLayer=L.geoJSON(feature);map.fitBounds(geoLayer.getBounds().pad(0.3),{maxZoom:17});const areaRaw=props.area_scale||props.area||null;let areaStr='—';if(areaRaw){const sqm=parseFloat(areaRaw);if(!isNaN(sqm)&&sqm>0)areaStr=sqm>10000?`${(sqm/10000).toFixed(2)} ha (${Math.round(sqm).toLocaleString('lv-LV')} m²)`:`${Math.round(sqm).toLocaleString('lv-LV')} m²`}addToHistory(code,areaRaw);const bounds=geoLayer.getBounds(),center=bounds.getCenter(),lat=center.lat.toFixed(5),lng=center.lng.toFixed(5),gmapsUrl=`https://www.google.com/maps?q=${lat},${lng}`;document.getElementById('resultArea').innerHTML=`<div class="result-card"><div class="result-header"><h3>Zemes vienība</h3><button class="result-close" onclick="clearResult();clearHighlight()">✕</button></div><div class="result-body"><div class="result-cadastral">${code}</div><div class="result-row"><span class="result-label">Platība</span><span class="result-value">${areaStr}</span></div><div class="result-row"><span class="result-label">Koordinātas</span><span class="result-value"><a href="${gmapsUrl}" target="_blank" class="coords-link">${lat}, ${lng} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></span></div><div class="result-actions"><button class="action-btn" onclick="copyToClipboard('${code}')">Kopēt</button><button class="action-btn" onclick="openKadastrs('${code}')">kadastrs.lv</button><button class="action-btn" onclick="exportGeoJSON(currentFeature)">GeoJSON</button></div></div></div>`}
let currentFeature=null;
function showMultipleResults(features,query){showStatus('info',`Atrasti ${features.length} rezultāti${features.length>=50?' (max 50)':''}`);const html=features.map((f,i)=>{const p=f.properties||{};const c=p.code||p.CODE||'?';const a=p.area||null;let s='';if(a){const sqm=parseFloat(a);s=sqm>10000?`${(sqm/10000).toFixed(2)} ha`:`${sqm} m²`}return`<div class="results-list-item" onclick="selectFeatureFromList(${i})"><div class="code">${c}</div>${s?`<div class="meta">${s}</div>`:''}</div>`}).join('');document.getElementById('resultArea').innerHTML=`<div class="result-card"><div class="result-header"><h3>Rezultāti</h3><button class="result-close" onclick="clearResult();clearHighlight();clearStatus()">✕</button></div><div class="results-list">${html}</div></div>`;window._searchFeatures=features;if(highlightLayer)map.removeLayer(highlightLayer);highlightLayer=L.geoJSON(features,{style:{color:'#34d399',weight:2.5,fillColor:'#34d399',fillOpacity:0.15}}).addTo(map);map.fitBounds(highlightLayer.getBounds().pad(0.2))}
function selectFeatureFromList(i){clearResult();clearStatus();showSingleResult(window._searchFeatures[i])}
function highlightFeature(f){clearHighlight();currentFeature=f;highlightLayer=L.geoJSON(f,{style:{color:'#34d399',weight:3,fillColor:'#34d399',fillOpacity:0.2}}).addTo(map)}
function clearHighlight(){if(highlightLayer){map.removeLayer(highlightLayer);highlightLayer=null}currentFeature=null}
function copyToClipboard(t){navigator.clipboard.writeText(t).then(()=>{showStatus('info','Nokopēts!');setTimeout(clearStatus,2000)})}
function openKadastrs(c){window.open('https://www.kadastrs.lv/','_blank')}
function exportGeoJSON(f){if(!f)return;const b=new Blob([JSON.stringify(f,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`${f.properties?.code||'parcel'}.geojson`;a.click();URL.revokeObjectURL(u)}
function pointInPolygon(lat,lng,coords){const ring=coords[0];let inside=false;for(let i=0,j=ring.length-1;i<ring.length;j=i++){const xi=ring[i][1],yi=ring[i][0],xj=ring[j][1],yj=ring[j][0];if(((yi>lng)!==(yj>lng))&&(lat<(xj-xi)*(lng-yi)/(yj-yi)+xi))inside=!inside}return inside}
function featureContainsPoint(f,lat,lng){const g=f.geometry;if(!g)return false;if(g.type==='Polygon')return pointInPolygon(lat,lng,g.coordinates);if(g.type==='MultiPolygon')return g.coordinates.some(p=>pointInPolygon(lat,lng,p));return false}
let identifyInProgress=false;
map.on('click',async e=>{const t=e.originalEvent?.target;if(t&&(t.closest('.search-panel')||t.closest('.custom-zoom')||t.closest('.coords-badge')))return;if(identifyInProgress)return;const zoom=map.getZoom();if(zoom<12){showStatus('info','Pietuvinieties tuvāk');setTimeout(clearStatus,3000);return}const{lat,lng}=e.latlng;const d=zoom>=16?0.0005:zoom>=14?0.001:0.003;identifyInProgress=true;showStatus('loading','Identificēju...');try{const url=`${WFS_BASE}?service=WFS&version=1.1.0&request=GetFeature&typeName=publicwfs:kkparcel&outputFormat=application/json&srsName=EPSG:4326&bbox=${lng-d},${lat-d},${lng+d},${lat+d},EPSG:4326&maxFeatures=50`;const resp=await fetch(url);if(!resp.ok){showStatus('error',`WFS: ${resp.status}`);identifyInProgress=false;return}const data=await resp.json();if(data.features?.length){const hits=data.features.filter(f=>featureContainsPoint(f,lat,lng));if(hits.length){let best=hits[0],bestA=Infinity;for(const f of hits){const v=parseFloat(f.properties?.area_scale||f.properties?.area||Infinity);if(!isNaN(v)&&v<bestA){bestA=v;best=f}}clearResult();clearStatus();showSingleResult(best);searchInput.value=best.properties?.code||''}else{showStatus('info','Nav atrasta zemes vienība');setTimeout(clearStatus,3000)}}else{showStatus('info','Nav atrasta zemes vienība');setTimeout(clearStatus,3000)}}catch(err){showStatus('error',err.message);setTimeout(clearStatus,4000)}identifyInProgress=false});
function updateCursor(){map.getContainer().style.cursor=map.getZoom()>=12?'pointer':''}map.on('zoomend',updateCursor);updateCursor();
const listingsLayer=L.layerGroup().addTo(map);
async function loadListings(){try{const resp=await fetch('/api/listings');if(!resp.ok)return;const listings=await resp.json();listingsLayer.clearLayers();for(const l of listings){const code=l.cadastral_code.replace(/[\s\-]/g,'');const params=`service=WFS&version=1.1.0&request=GetFeature&typeName=publicwfs:kkparcel&outputFormat=application/json&srsName=EPSG:4326&CQL_FILTER=code%3D%27${code}%27&maxFeatures=1`;const r=await fetch(`${WFS_BASE}?${params}`);if(!r.ok)continue;const d=await r.json();if(!d.features?.length)continue;const layer=L.geoJSON(d.features[0],{style:{color:'#f59e0b',weight:3,fillColor:'#f59e0b',fillOpacity:0.25}});const center=layer.getBounds().getCenter();if(l.price){listingsLayer.addLayer(L.marker(center,{icon:L.divIcon({className:'price-label',html:`€${Number(l.price).toLocaleString('lv-LV')}`,iconSize:null})}))}let popup=`<div class="listing-popup"><div class="lp-code">${code}</div>`;if(l.price)popup+=`<div class="lp-price">€${Number(l.price).toLocaleString('lv-LV')}</div>`;if(l.area_ha)popup+=`<div class="lp-area">${l.area_ha} ha</div>`;if(l.description)popup+=`<div class="lp-desc">${l.description}</div>`;popup+='</div>';layer.bindPopup(popup,{className:'dark-popup'});listingsLayer.addLayer(layer)}}catch(e){console.warn('Listings:',e)}}
loadListings();
</script>
</body>
</html>
